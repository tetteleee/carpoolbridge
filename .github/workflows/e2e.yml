name: E2E Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "tasks/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "tasks/**"

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # firebase-toolsはFirestore Emulator（Java）にJava 21以上を要求するが、
      # ubuntu-24.04ランナーのデフォルトjavaはJava 17のため、明示的にセットアップする。
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Firebase Emulator Suite上で実行)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
